name: Keep Alive

# 定时 ping /api/health，防止 Render 免费实例休眠（7×24，无需有人打开页面）
on:
  schedule:
    # GitHub Actions 最小间隔为 5 分钟；这里用每 10 分钟触发一次。
    # 注意：Render 免费实例约 15 分钟无请求会休眠，10 分钟间隔留足余量。
    - cron: "*/10 * * * *"
  workflow_dispatch: {}  # 支持手动触发测试

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          # 在仓库 Settings → Secrets and variables → Actions 中配置：
          # KEEP_ALIVE_URL = https://<你的Render域名>/api/health
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL }}
        run: |
          if [ -z "$KEEP_ALIVE_URL" ]; then
            echo "未配置 KEEP_ALIVE_URL secret，跳过。请在仓库 Secrets 中设置。"
            exit 0
          fi
          echo "Pinging $KEEP_ALIVE_URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$KEEP_ALIVE_URL" || echo "000")
          echo "HTTP status: $code"
          # 即使休眠冷启动返回非 200，也已触发唤醒，不让工作流失败
          exit 0